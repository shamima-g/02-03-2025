# Generated by design-api-agent
openapi: "3.0.3"
info:
  title: Contact Form with Admin Inbox API
  version: "1.0.0"
  description: >
    REST API for the Contact Form with Admin Inbox feature on a personal
    portfolio/blog site. Provides two endpoints: one for public visitors to
    submit contact messages, and one for the site admin to retrieve all
    submitted messages.

    The admin inbox uses a frontend-only password gate (BR8). The GET
    /contact-messages endpoint is marked as requiring Bearer auth so the
    API client can forward an Authorization header if a backend guard is
    added later. In the initial scope the backend may accept any token or
    omit the check entirely — the frontend never sends credentials to the
    backend (auth is local-only per BR8).

servers:
  - url: http://localhost:3001/api
    description: Local development server

tags:
  - name: Contact Messages
    description: Endpoints for submitting and retrieving contact form messages

paths:
  /contact-messages:
    post:
      operationId: submitContactMessage
      tags:
        - Contact Messages
      summary: Submit a contact form message
      description: >
        Accepts a contact form submission from a public visitor. The backend
        is responsible for verifying the reCAPTCHA v3 token score (BR7) and
        persisting the message. The frontend enforces honeypot detection
        (BR6) before calling this endpoint, so the backend will only receive
        genuine (non-bot) submissions.
      x-requirements: [R8, R9, R10, R11, R14, R15, BR1, BR2, BR3, BR4, BR5, BR7]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitContactMessageRequest"
            example:
              name: "Jane Smith"
              email: "jane@example.com"
              subject: "Work Inquiry"
              message: "Hi, I would love to discuss a potential project with you."
              recaptchaToken: "03AGdBq24..."
      responses:
        "201":
          description: Message submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
              example:
                id: "cm_01HXYZ123"
                name: "Jane Smith"
                email: "jane@example.com"
                subject: "Work Inquiry"
                message: "Hi, I would love to discuss a potential project with you."
                timestamp: "2026-03-02T08:15:00Z"
        "400":
          description: >
            Validation error — one or more request fields failed server-side
            validation (BR1, BR2, BR3, BR4, BR5).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Validation failed"
                code: "VALIDATION_ERROR"
                details:
                  - "Name must be at least 2 characters."
                  - "Please enter a valid email address."
        "422":
          description: >
            Unprocessable entity — reCAPTCHA token verification failed or
            score is below the acceptable threshold (BR7).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "reCAPTCHA verification failed"
                code: "RECAPTCHA_FAILED"
                details: []
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "An unexpected error occurred. Please try again later."
                code: "INTERNAL_SERVER_ERROR"
                details: []

    get:
      operationId: listContactMessages
      tags:
        - Contact Messages
      summary: Retrieve all submitted contact messages
      description: >
        Returns all submitted contact messages in reverse-chronological order
        (newest first). This endpoint is intended for the admin inbox (R16,
        R18, R19). No pagination is provided in the initial scope (R19).

        Authentication note: the frontend uses a purely local password gate
        (BR8) and does not forward credentials to the backend. This security
        scheme is documented here to signal that the endpoint should be
        protected if a backend guard is implemented in the future.
      x-requirements: [R16, R18, R19, BR8]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of all contact messages, newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessageListResponse"
              example:
                messages:
                  - id: "cm_01HXYZ123"
                    name: "Jane Smith"
                    email: "jane@example.com"
                    subject: "Work Inquiry"
                    message: "Hi, I would love to discuss a potential project with you."
                    timestamp: "2026-03-02T08:15:00Z"
                  - id: "cm_01HXYZ000"
                    name: "Bob Lee"
                    email: "bob@example.com"
                    subject: "General Inquiry"
                    message: "Just wanted to say great work on the portfolio!"
                    timestamp: "2026-03-01T14:30:00Z"
                total: 2
        "401":
          description: Unauthorized — no valid Bearer token provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "Authentication required"
                code: "UNAUTHORIZED"
                details: []
        "403":
          description: Forbidden — token present but insufficient permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "You do not have permission to access this resource"
                code: "FORBIDDEN"
                details: []
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: "An unexpected error occurred. Please try again later."
                code: "INTERNAL_SERVER_ERROR"
                details: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Bearer token for admin-only endpoints. In the initial scope the
        frontend uses a local password gate (BR8) and does not send a token
        to the backend. This scheme is defined for future use when a real
        backend auth guard is added.

  schemas:
    SubjectEnum:
      type: string
      enum:
        - "General Inquiry"
        - "Work Inquiry"
        - "Feedback"
        - "Other"
      description: >
        Allowed values for the Subject field (R3, BR3). Must be one of the
        four predefined options.

    SubmitContactMessageRequest:
      type: object
      description: >
        Request body for submitting a contact form message. All fields are
        required (R5). Validation rules are defined in BR1–BR5 and BR7.
      required:
        - name
        - email
        - subject
        - message
        - recaptchaToken
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: >
            Sender's full name. Must be at least 2 characters (BR1).
          example: "Jane Smith"
        email:
          type: string
          format: email
          description: >
            Sender's email address. Must match standard email format
            user@domain.tld (BR2).
          example: "jane@example.com"
        subject:
          $ref: "#/components/schemas/SubjectEnum"
        message:
          type: string
          minLength: 10
          maxLength: 1000
          description: >
            Message body. Must be at least 10 characters (BR4) and no more
            than 1000 characters (BR5).
          example: "Hi, I would love to discuss a potential project with you."
        recaptchaToken:
          type: string
          minLength: 1
          description: >
            Google reCAPTCHA v3 token obtained from the invisible widget on
            the frontend (R14, BR7). The backend must verify this token and
            its score. The frontend does not interpret the score.
          example: "03AGdBq24..."

    ContactMessage:
      type: object
      description: >
        A persisted contact form message as returned by the backend. Includes
        all submitted fields plus the server-assigned id and timestamp.
      required:
        - id
        - name
        - email
        - subject
        - message
        - timestamp
      properties:
        id:
          type: string
          description: >
            Unique server-assigned identifier for the message.
          example: "cm_01HXYZ123"
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Sender's full name (R18).
          example: "Jane Smith"
        email:
          type: string
          format: email
          description: Sender's email address (R18).
          example: "jane@example.com"
        subject:
          $ref: "#/components/schemas/SubjectEnum"
        message:
          type: string
          minLength: 10
          maxLength: 1000
          description: Message body (R18).
          example: "Hi, I would love to discuss a potential project with you."
        timestamp:
          type: string
          format: date-time
          description: >
            ISO 8601 datetime of when the message was received and persisted
            by the backend (auto-generated on creation, R18).
          example: "2026-03-02T08:15:00Z"

    ContactMessageListResponse:
      type: object
      description: >
        Response envelope for the admin inbox message list (R16, R19).
      required:
        - messages
        - total
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ContactMessage"
          description: >
            Array of all contact messages, ordered newest first.
        total:
          type: integer
          minimum: 0
          description: >
            Total number of messages returned. Equals messages.length in the
            initial scope (no pagination, R19).
          example: 2

    ErrorResponse:
      type: object
      description: >
        Standard error response returned on 4xx and 5xx responses.
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: Human-readable error message suitable for display.
          example: "Validation failed"
        code:
          type: string
          description: >
            Machine-readable error code for programmatic error handling.
          example: "VALIDATION_ERROR"
        details:
          type: array
          items:
            type: string
          description: >
            Optional list of additional error details, such as per-field
            validation messages (e.g., BR1, BR2, BR3, BR4, BR5).
          example:
            - "Name must be at least 2 characters."
            - "Please enter a valid email address."
